[workspace]
authors = ["Erik Holum <eholum@gmail.com>"]
channels = ["conda-forge"]
name = "roboplan-ros"
platforms = ["linux-64", "linux-aarch64"]
version = "0.5.1"

[tasks]
setup-colcon = { cmd = """
colcon mixin add default https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml || true && \
colcon mixin update default
""" }
build = { cmd = ["colcon", "build"] }
build-symlink = { cmd = ["colcon", "build", "--symlink-install"] }
# TODO: Stop skipping the test_import_pinocchio when RoboStack is caught up on Pinocchio >= 4.0.0
test = { cmd = ["colcon", "test"], env = { PYTEST_ADDOPTS = "-k 'not test_import_pinocchio'" } }
test-result = { cmd = ["colcon", "test-result", "--verbose"] }

[dependencies]
# Build deps
colcon-common-extensions = ">=0.3.0,<0.4"
colcon-mixin = ">=0.2.3,<0.3"
cmake = ">=3.30.5,<4"
clangxx = ">=19.1.7,<20"
lld = ">=19.1.2,<20"
ninja = ">=1.13.1,<2"
mold = ">=2.40.2,<3"
sccache = ">=0.10.0,<0.11"

# Common roboplan base deps
python = ">=3.11,<3.15"
gtest = ">=1.17.0,<2"
tyro = ">=0.9.32,<0.10"
matplotlib = ">=3.10.6,<4"
filelock = ">=3.20.0,<4"
numpy = ">=1.26.4,<3"
nanobind = ">=2.12.0,<3"
libtoppra  = ">=0.6.4,<0.7"
proxsuite = ">=0.7.3,<0.8"

viser = ">=1.0.29,<2.0"  # See https://github.com/viser-project/viser/issues/719
pycollada = ">=0.9.2, <0.10"
nodeenv = ">=1.10.0, <2"

# For ROS, should be available across distros
lttng-ust = ">=2.13.9,<3"

# This fails with colcon test on newer pytest versions
# due to failures loading ROS launch testing plugins.
pytest = "<9.1.0"

[pypi-dependencies]
obj2mjcf = ">=0.0.25, <0.0.26"

[activation]
scripts = ["install/setup.sh"]

[activation.env]
# Prioritize pixi installed packages
CMAKE_PREFIX_PATH = "${CONDA_PREFIX}:${CMAKE_PREFIX_PATH}"
# Ensures the linker knows where to look for conda managed packages
LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LIBRARY_PATH}"
LD_LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}"
LDFLAGS = "-L${CONDA_PREFIX}/lib -Wl,-rpath,${CONDA_PREFIX}/lib"
CXXFLAGS = "-fuse-ld=mold"

# Define one environment per ROS 2 distro.
[environments]
rolling = { features = ["rolling"] }
lyrical = { features = ["lyrical"] }
kilted = { features = ["kilted"] }
jazzy = { features = ["jazzy"] }
humble = { features = ["humble"] }

###################
## ROS 2 Rolling ##
###################
[feature.rolling]
channels = ["https://prefix.dev/robostack-rolling"]

[feature.rolling.dependencies]
ros-rolling-ros-base = "*"

# RoboPlan and RoboPlan ROS dependencies
ros-rolling-builtin-interfaces = "*"
ros-rolling-coal = "*"
ros-rolling-console-bridge-vendor = "*"
ros-rolling-controller-manager = "*"
ros-rolling-eigenpy = "*"
ros-rolling-geometry-msgs = "*"
ros-rolling-interactive-markers = "*"
ros-rolling-joint-state-broadcaster = "*"
ros-rolling-joint-trajectory-controller = "*"
ros-rolling-parallel-gripper-controller = "*"
ros-rolling-pinocchio = "*"
ros-rolling-robot-state-publisher = "*"
ros-rolling-ros2controlcli = "*"
ros-rolling-rviz2 = "*"
ros-rolling-sensor-msgs = "*"
ros-rolling-tf2-eigen = "*"
ros-rolling-tinyxml2-vendor = "*"
ros-rolling-topic-tools = "*"
ros-rolling-trajectory-msgs = "*"
ros-rolling-urdfdom = "*"
ros-rolling-visualization-msgs = "*"
ros-rolling-xacro = "*"

[feature.rolling.activation.env]
ROS_DISTRO = "rolling"

