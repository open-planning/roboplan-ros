[workspace]
authors = [
    "Erik Holum <eholum@gmail.com>",
    "Sebastian Castro <sebas.a.castro@gmail.com>"
]
channels = ["conda-forge"]
name = "roboplan-ros"
platforms = ["linux-64", "linux-aarch64", "osx-arm64", "win-64"]
version = "0.5.1"

[tasks]
setup-colcon = { cmd = """
colcon mixin add default https://raw.githubusercontent.com/colcon/colcon-mixin-repository/master/index.yaml || true && \
colcon mixin update default
""" }
build = { cmd = ["colcon", "build"] }
build-symlink = { cmd = ["colcon", "build", "--symlink-install"] }
test = { cmd = ["colcon", "test"] }
test-result = { cmd = ["colcon", "test-result", "--verbose"] }

# Use the mold linker on Linux. Added here rather than in colcon_defaults.yaml,
# since the defaults file applies to all platforms.
[target.linux.tasks]
build = { cmd = ["colcon", "build", "--mixin", "mold"] }
build-symlink = { cmd = ["colcon", "build", "--symlink-install", "--mixin", "mold"] }

# Use the MSVC-compatible clang driver: conda-forge packages are built with
# MSVC and export MSVC-style flags that the GNU-style clang++ driver rejects.
[target.win.tasks]
build = { cmd = [
  "colcon", "build", "--cmake-args",
  "-GNinja",
  "-DCMAKE_C_COMPILER=clang-cl",
  "-DCMAKE_CXX_COMPILER=clang-cl",
  "-DCMAKE_LINKER=lld-link",
] }

[dependencies]
# Build deps
colcon-common-extensions = ">=0.3.0,<0.4"
colcon-mixin = ">=0.2.3,<0.3"
cmake = ">=3.30.5,<4"
clangxx = ">=19.1.7,<20"
lld = ">=19.1.2,<20"
ninja = ">=1.13.1,<2"
sccache = ">=0.16.0,<0.17"

# Common roboplan base deps
python = ">=3.11,<3.15"
gtest = ">=1.17.0,<2"
tyro = ">=0.9.32,<0.10"
matplotlib = ">=3.10.6,<4"
filelock = ">=3.20.0,<4"
numpy = ">=1.26.4,<3"
nanobind = ">=2.12.0,<3"
libtoppra  = ">=0.6.4,<0.7"
proxsuite = ">=0.7.3,<0.8"

viser = ">=1.0.29,<2.0"  # See https://github.com/viser-project/viser/issues/719
pycollada = ">=0.9.2, <0.10"
nodeenv = ">=1.10.0, <2"

# This fails with colcon test on newer pytest versions
# due to failures loading ROS launch testing plugins.
pytest = "<9.1.0"

[target.linux.dependencies]
mold = ">=2.40.2,<3"
# For ROS tracing, Linux-only
lttng-ust = ">=2.13.9,<3"

[target.win.dependencies]
# Needed to lookup example model resources on non-POSIX platforms.
dlfcn-win32 = ">=1.4.2,<2"
# The MSVC STL on current GitHub Windows runners (Visual Studio 2026) requires
# clang >= 20, so use a newer LLVM toolchain than on Linux.
clangxx = ">=22.1.8,<23"
compiler-rt = ">=22.1.8,<23"
lld = ">=22.1.8,<23"
llvm-tools = ">=22.1.8,<23"

[pypi-dependencies]
obj2mjcf = ">=0.0.25, <0.0.26"

[activation]
scripts = ["install/setup.sh"]

[target.unix.activation.env]
# Prioritize pixi installed packages
CMAKE_PREFIX_PATH = "${CONDA_PREFIX}:${CMAKE_PREFIX_PATH}"
# Ensures the linker knows where to look for conda managed packages
LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LIBRARY_PATH}"
LD_LIBRARY_PATH = "${CONDA_PREFIX}/lib:${LD_LIBRARY_PATH}"
LDFLAGS = "-L${CONDA_PREFIX}/lib -Wl,-rpath,${CONDA_PREFIX}/lib"

[target.linux.activation.env]
CXXFLAGS = "-fuse-ld=mold"

# Windows activation scripts expand %VAR% instead of $VAR.
[target.win.activation]
scripts = ['install\setup.bat']

[target.win.activation.env]
# Prioritize pixi installed packages, which live under Library on Windows
CMAKE_PREFIX_PATH = '%CONDA_PREFIX%\Library;%CMAKE_PREFIX_PATH%'
# Restore PATH-based DLL resolution so Python extensions can find the
# workspace and ROS DLLs (standard RoboStack guidance for Windows).
CONDA_DLL_SEARCH_MODIFICATION_ENABLE = "1"

# Define one environment per ROS 2 distro.
[environments]
rolling = { features = ["rolling"] }
lyrical = { features = ["lyrical"] }
kilted = { features = ["kilted"] }
jazzy = { features = ["jazzy"] }
humble = { features = ["humble"] }

###################
## ROS 2 Rolling ##
###################
[feature.rolling]
channels = ["https://prefix.dev/robostack-rolling"]

[feature.rolling.dependencies]
ros-rolling-ros-base = "*"

# RoboPlan and RoboPlan ROS dependencies
ros-rolling-builtin-interfaces = "*"
ros-rolling-console-bridge-vendor = "*"
ros-rolling-controller-manager = "*"
ros-rolling-geometry-msgs = "*"
ros-rolling-interactive-markers = "*"
ros-rolling-joint-state-broadcaster = "*"
ros-rolling-joint-trajectory-controller = "*"
ros-rolling-parallel-gripper-controller = "*"
ros-rolling-robot-state-publisher = "*"
ros-rolling-ros2controlcli = "*"
ros-rolling-rviz2 = "*"
ros-rolling-sensor-msgs = "*"
ros-rolling-tf2-eigen = "*"
ros-rolling-tinyxml2-vendor = "*"
ros-rolling-topic-tools = "*"
ros-rolling-trajectory-msgs = "*"
ros-rolling-urdfdom = "*"
ros-rolling-visualization-msgs = "*"
ros-rolling-xacro = "*"

# Pinocchio from conda-forge, since RoboStack does not build it for win-64
pinocchio = ">=4.1.0,<5"

[feature.rolling.activation.env]
ROS_DISTRO = "rolling"

