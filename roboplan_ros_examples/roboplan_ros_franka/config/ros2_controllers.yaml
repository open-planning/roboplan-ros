/**:
  controller_manager:
    ros__parameters:
      update_rate: 100  # Hz (the real Franka uses 1000 but we don't need this in sim)

      fr3_arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      fr3_gripper_controller:
        type: parallel_gripper_action_controller/GripperActionController

      left_fr3_arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      right_fr3_arm_controller:
        type: joint_trajectory_controller/JointTrajectoryController

      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster


  fr3_arm_controller:
    ros__parameters:
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      interpolate_from_desired_state: true
      joints:
        - fr3_joint1
        - fr3_joint2
        - fr3_joint3
        - fr3_joint4
        - fr3_joint5
        - fr3_joint6
        - fr3_joint7

  fr3_gripper_controller:
    ros__parameters:
      joint: fr3_finger_joint1
      goal_tolerance: 0.002
      allow_stalling: true
      stall_velocity_threshold: 0.001
      stall_timeout: 1.0

  left_fr3_arm_controller:
    ros__parameters:
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      interpolate_from_desired_state: true
      joints:
        - left_fr3_joint1
        - left_fr3_joint2
        - left_fr3_joint3
        - left_fr3_joint4
        - left_fr3_joint5
        - left_fr3_joint6
        - left_fr3_joint7

  left_fr3_gripper_controller:
    ros__parameters:
      joint: left_fr3_finger_joint1
      goal_tolerance: 0.002
      allow_stalling: true
      stall_velocity_threshold: 0.001
      stall_timeout: 1.0

  right_fr3_arm_controller:
    ros__parameters:
      command_interfaces:
        - position
      state_interfaces:
        - position
        - velocity
      interpolate_from_desired_state: true
      joints:
        - right_fr3_joint1
        - right_fr3_joint2
        - right_fr3_joint3
        - right_fr3_joint4
        - right_fr3_joint5
        - right_fr3_joint6
        - right_fr3_joint7

  right_fr3_gripper_controller:
    ros__parameters:
      joint: right_fr3_finger_joint1
      goal_tolerance: 0.002
      allow_stalling: true
      stall_velocity_threshold: 0.001
      stall_timeout: 1.0
